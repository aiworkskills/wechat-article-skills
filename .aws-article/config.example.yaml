# 公众号运营配置示例
# 复制为 config.yaml 后按需修改；或首次由 main 引导生成。
# 路径：项目 .aws-article/ 或用户 ~/.aws-article/

account_type: 科技
target_reader: ""
tone: 轻松
update_frequency: 周更
default_author: ""

topic_direction: ""
title_style: 干货型
title_max_length: 25
summary_length: "80-150"
forbidden_title_phrases: []

article_style: 口语化
paragraph_preference: 短段为主
heading_density: 每节必有小标题
closing_block: ""
forbidden_words: []
original_attribution: ""

default_format_preset: ""

cover_aspect: "2.35:1"
cover_style: 简约
image_density: 每节一图
caption_style: 有图注
multi_image_count: 6
assets_root: imgs/
header_image: ""
footer_image: ""

review_required:
  - 敏感词
  - 错别字
  - 链接
  - 原创标注
custom_sensitive_words: []
review_output_format: 分块详细

posts_root: posts/
drafts_root: drafts/
published_root: posts/published/
